services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: shade
      POSTGRES_PASSWORD: shade
      POSTGRES_DB: shade
    ports:
      - "5432:5432"
    volumes:
      - shade-postgres:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  shade-postgres:
